resources:
  jobs:
    nfl_pbp_ingest:
      name: nfl_pbp_ingest
      description: >
        Loads prior-season nflverse play-by-play (REG + POST).
        Run annually after the season ends or on-demand when refreshing historical PBP.
      schedule:
        quartz_cron_expression: "0 0 8 15 2 ?"
        timezone_id: America/New_York
        pause_status: PAUSED
      environments:
        - environment_key: nfl_env
          spec:
            environment_version: "4"
            dependencies:
              - pandas>=2.0.0
              - pyarrow>=14.0.0
              - ../dist/nfl_odds-0.1.0-py3-none-any.whl
      tasks:
        - task_key: ingest_pbp
          environment_key: nfl_env
          notebook_task:
            notebook_path: ../notebooks/ingest_nflverse_pbp.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              pbp_season: ${var.pbp_season}